name: Pull Request Events

on: pull_request

permissions:
  contents: write
  id-token: write
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Unit tests
    runs-on: ubuntu-latest

    steps:
      - name: ⬇️ Set up code
        uses: actions/checkout@v5

      - name: 📦 Setup PNPM
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: ⎔ Setup Node.js
        uses: actions/setup-node@v5
        with:
          node-version: lts/*
          cache: pnpm

      - name: 📥 Download dependencies
        run: pnpm install

      - name: 🧶 Lint
        run: pnpm run lint

      - name: 🧪 Run tests
        run: pnpm test
